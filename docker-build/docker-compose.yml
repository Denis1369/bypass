services:
  build-all:
    platform: linux/amd64
    build:
      context: ..
      dockerfile: docker-build/Dockerfile
    working_dir: /workspace
    volumes:
      - ../:/workspace/whitelist-bypass
      - ./build-all.sh:/opt/build_all/build-all.sh
      - android-sdk-cache:/opt/android-sdk
      - android-gradle-cache:/opt/gradle
    environment:
      BUILD_NUMBER: "${BUILD_NUMBER:-0}"
    command:
      - /bin/bash
      - -lc
      - tr -d '\r' < /opt/build_all/build-all.sh > /tmp/build-all.sh && chmod +x /tmp/build-all.sh && exec /bin/bash /tmp/build-all.sh

volumes:
  android-sdk-cache:
  android-gradle-cache:
